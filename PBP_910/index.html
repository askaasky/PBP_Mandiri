<!DOCTYPE html>
<html>
<head>
    <title>Tugas 4 Media Query</title>

    <style>
        body{
            background-color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px;
        }

        @media (max-width: 600px){
            body{
                background-color: lightblue;
            }
        }
    </style>

</head>
<body>

    <h1>Media Query CSS</h1>

    <p>
        Halaman ini menggunakan media query.
        Jika ukuran layar kurang dari 600px,
        warna latar belakang akan berubah menjadi biru muda.
    </p>

</body>
</html>
